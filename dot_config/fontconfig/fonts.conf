<?xml version='1.0' encoding='UTF-8' standalone='no'?>
<fontconfig>
 <selectfont>
  <rejectfont>
   <pattern>
    <patelt name="family">
     <string>Arial</string>
    </patelt>
   </pattern>
  </rejectfont>
 </selectfont>
 <dir>~/.local/share/fonts</dir>
 <alias>
  <family>Segoe UI Emoji</family>
  <prefer>
   <family>sans-serif</family>
  </prefer>
 </alias>
 <match target="font">
  <edit mode="assign" name="hinting">
   <bool>true</bool>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="hintstyle">
   <const>hintslight</const>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="rgba">
   <const>rgb</const>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="lcdfilter">
   <const>lcddefault</const>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="embeddedbitmap">
   <bool>true</bool>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="antialias">
   <bool>true</bool>
  </edit>
 </match>
</fontconfig>
